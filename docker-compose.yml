version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: ems-postgres-db
    restart: always
    environment:
      POSTGRES_DB: enterprise_ems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically initialize database schema and seed data on startup
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    networks:
      - ems-network

  # 2. Node.js Express API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-api-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=enterprise_ems
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=super_secret_enterprise_jwt_signing_key_2026
      - JWT_REFRESH_SECRET=super_secret_enterprise_jwt_refresh_signing_key_2026
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
    depends_on:
      - db
    networks:
      - ems-network

  # 3. Nginx Static Web Client Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ems-web-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ems-network

volumes:
  postgres_data:

networks:
  ems-network:
    driver: bridge
